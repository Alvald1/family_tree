<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Персональная страница</title>

    <!-- CSS files -->
    <link rel="stylesheet" href="assets/css/main.css?v=tree-node-id-20260709-1">
    <link rel="stylesheet" href="assets/css/person-page.css?v=tree-node-id-20260709-1">
    <link rel="stylesheet" href="assets/css/photo-gallery.css?v=tree-node-id-20260709-1">
    <link rel="stylesheet" href="assets/css/messages.css?v=tree-node-id-20260709-1">
</head>

<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-button">← Назад к дереву</a>
            <a href="/auth/logout" class="logout-button" aria-label="Выйти из аккаунта">Выйти</a>
            <div class="person-header">
                <h1 class="person-name" id="personName">Загрузка...</h1>
                <p class="person-dates" id="personDates">Загрузка дат...</p>
                <div class="person-details" id="personDetails">
                    <div class="loading">
                        <p>Загрузка информации...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="tabs">
                <button class="tab-button active" data-tab="messages">Сообщения</button>
                <button class="tab-button" data-tab="photos">📷 Фотографии</button>
            </div>

            <div class="tab-content active" id="messages-tab">
                <div class="messages-container">
                    <div class="messages-header">
                        <h3>Сообщения и заметки</h3>
                        <button class="btn add-message-btn" id="addMessageBtn">+ Добавить сообщение</button>
                    </div>
                    <div class="messages-list" id="messagesList">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>Загрузка сообщений...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-content" id="photos-tab">
                <div class="photos-container">
                    <div class="photos-header">
                        <h3>Фотографии</h3>
                        <button class="btn add-photo-btn" id="addPhotoBtn">+ Добавить фото</button>
                    </div>
                    <div class="photos-grid" id="photosGrid">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>Загрузка фотографий...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript files -->
    <script src="assets/js/config.js?v=tree-node-id-20260709-1"></script>
    <script src="assets/js/utils.js?v=tree-node-id-20260709-1"></script>
    <script src="assets/js/person-api.js?v=tree-node-id-20260709-1"></script>
    <script src="assets/js/person-tabs.js?v=tree-node-id-20260709-1"></script>
    <script src="assets/js/person-messages.js?v=tree-node-id-20260709-1"></script>
    <script src="assets/js/person-photos.js?v=tree-node-id-20260709-1"></script>
    <script src="assets/js/person-page.js?v=tree-node-id-20260709-1"></script>
</body>

</html>
