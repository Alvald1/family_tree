name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on:
      - self-hosted
      - family-tree

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Validate compose config
        run: docker compose config

  deploy:
    runs-on:
      - self-hosted
      - family-tree
    needs: test
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write production env on server
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          FAMILY_TREE_SESSION_SECRET: ${{ secrets.FAMILY_TREE_SESSION_SECRET }}
          FAMILY_TREE_S3_BUCKET: s3-gribovka
          FAMILY_TREE_S3_ENDPOINT_URL: https://storage.yandexcloud.net
          FAMILY_TREE_S3_REGION: ru-central1
          YANDEX_ADMIN_LOGINS: ${{ secrets.YANDEX_ADMIN_LOGINS }}
          YANDEX_ALLOWED_LOGINS: ${{ secrets.YANDEX_ALLOWED_LOGINS }}
          YANDEX_CLIENT_ID: ${{ secrets.YANDEX_CLIENT_ID }}
          YANDEX_CLIENT_SECRET: ${{ secrets.YANDEX_CLIENT_SECRET }}
          YANDEX_EDITOR_LOGINS: ${{ secrets.YANDEX_EDITOR_LOGINS }}
          YANDEX_REDIRECT_URI: ${{ secrets.YANDEX_REDIRECT_URI }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > /home/user/family_tree/.env.tmp
          import os

          required = [
              "AWS_ACCESS_KEY_ID",
              "AWS_SECRET_ACCESS_KEY",
              "FAMILY_TREE_SESSION_SECRET",
              "YANDEX_ALLOWED_LOGINS",
              "YANDEX_CLIENT_ID",
              "YANDEX_CLIENT_SECRET",
              "YANDEX_REDIRECT_URI",
          ]
          names = [
              "AWS_ACCESS_KEY_ID",
              "AWS_SECRET_ACCESS_KEY",
              "FAMILY_TREE_SESSION_SECRET",
              "FAMILY_TREE_S3_BUCKET",
              "FAMILY_TREE_S3_ENDPOINT_URL",
              "FAMILY_TREE_S3_REGION",
              "YANDEX_ADMIN_LOGINS",
              "YANDEX_ALLOWED_LOGINS",
              "YANDEX_CLIENT_ID",
              "YANDEX_CLIENT_SECRET",
              "YANDEX_EDITOR_LOGINS",
              "YANDEX_REDIRECT_URI",
          ]

          print("FAMILY_TREE_AUTH_ENABLED=true")
          print("FAMILY_TREE_CONTAINER_RUNTIME=true")
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              raise ValueError(
                  "Required production secrets are missing: " + ", ".join(missing)
              )
          for name in names:
              value = os.environ.get(name, "")
              if "\n" in value or "\r" in value:
                  raise ValueError(f"{name} must be a single-line value")
              print(f"{name}={value}")
          PY

          chmod 600 /home/user/family_tree/.env.tmp
          mv /home/user/family_tree/.env.tmp /home/user/family_tree/.env

      - name: Deploy on server
        shell: bash
        run: |
          set -euo pipefail
          cd /home/user/family_tree
          git pull --ff-only
          sudo chown -R 10001:10001 /home/user/family_tree_data/person_data
          sudo find /home/user/family_tree_data/person_data -type d -exec chmod 755 {} +
          sudo find /home/user/family_tree_data/person_data -type f -exec chmod 644 {} +
          sudo docker compose up -d --build
          sudo docker compose ps
