services:
  family-tree:
    build:
      context: .
    image: family-tree:latest
    container_name: family-tree
    restart: unless-stopped
    environment:
      FAMILY_TREE_HOST: 0.0.0.0
      FAMILY_TREE_PORT: 8000
      FAMILY_TREE_CONTAINER_RUNTIME: "true"
      FAMILY_TREE_DATA_DIR: /data/person_data
      FAMILY_TREE_SOURCE_FILE: /data/source.txt
      FAMILY_TREE_AUTH_ENABLED: ${FAMILY_TREE_AUTH_ENABLED:-true}
      FAMILY_TREE_S3_BUCKET: ${FAMILY_TREE_S3_BUCKET:-}
      FAMILY_TREE_S3_ENDPOINT_URL: ${FAMILY_TREE_S3_ENDPOINT_URL:-https://storage.yandexcloud.net}
      FAMILY_TREE_S3_REGION: ${FAMILY_TREE_S3_REGION:-ru-central1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-}
      YANDEX_REDIRECT_URI: ${YANDEX_REDIRECT_URI:-https://drevo.gribovka.ru/auth/callback}
      YANDEX_ALLOWED_LOGINS: ${YANDEX_ALLOWED_LOGINS:-}
      YANDEX_EDITOR_LOGINS: ${YANDEX_EDITOR_LOGINS:-}
      YANDEX_ADMIN_LOGINS: ${YANDEX_ADMIN_LOGINS:-}
      FAMILY_TREE_SESSION_SECRET: ${FAMILY_TREE_SESSION_SECRET:-}
    expose:
      - "8000"
    volumes:
      - ./person_data:/data/person_data
      - ./source.txt:/data/source.txt:ro
      - ./site/family_tree_vector.svg:/app/site/family_tree_vector.svg:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2.8-alpine@sha256:af32e97399febea808609119bb21544d0265c58a02836576e32a2d082c262c17
    container_name: family-tree-caddy
    restart: unless-stopped
    depends_on:
      family-tree:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
